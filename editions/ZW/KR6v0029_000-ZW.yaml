front:
  text: 瑜伽師地論披尋記敘韓清淨著整理者程恭讓題解韓清淨居士是中國近現代佛教思想史上中興唯識名家之一居士年在北京創立三時學會專事研究弘揚奘傳之第三時佛教與歐陽竟無居士的南京支那內學院同聲相應世有南歐北韓之稱清淨居士一生志業以瑜伽師地論為中心從年月迄於年月他以近六年之久的時間精力完成解釋瑜伽師地論的巨著科句及披尋記此後居士一邊繼續修改科句披尋記一邊積極準備培養弘揚瑜伽的人材然因時局動盪學侶星零居士壯志未酬抱道寂逝瑜伽師地論披尋記敘是清淨居士逝世前夕所作年冬居士晚年門人董紹明先生及另一同學整理清淨遺物時在居士臨書譜草字中發現此文原稿為草書董氏當即用法相研究會稿紙以小楷謄清清淨草書原稿交由王少逸居士時王負責三時學會的會務守護董氏抄稿則由董氏自藏年三時學會整理瑜伽師地論科句披尋記彙編打字印刷時倉促中未能刊登清淨此敘後文革中原三時學會及清淨家藏的居士遺著遺稿大都未免劫難王少逸守護的清淨草書本敘之原稿也不知去向獨有董紹明自藏抄稿劫後餘生實為幸事該抄稿清晰工整十分難得此敘係居士晚年自述平生心跡之作故彌足珍貴這篇敘文的重要意義在於以下幾點第一此敘記載了清淨居士研究瑜伽師地論的過程是居士一生學業發展的信史第二敘中闡明研究瑜伽的動機乃在欲以弘揚真實佛教精義此種思想立場與歐陽竟無簡別真偽的法相研究方法是一致的證實了現代唯識學中興思潮中的共性第三敘中比較成唯識論與瑜伽師地論說明成唯識論尚不足以窺大乘全體之大用認為佛教的教理淵海應以瑜伽為中心予以組織此為清淨居士唯識研究的特色第四居士在敘中指明印度十大論師的得失並對瑜伽的若干錯簡提出了自己的意見這為將來繼續整理瑜伽師地論提供了良好的基礎董氏抄稿中沒有標點及分段這次整理時除對原文標點分段外凡敘中引用的瑜伽師地論文字均一一核實並註明出處錄文
