body:
  text: 淨自聞法以還初讀俱舍繼研唯識俱舍以光記寶疏為歸唯識以慈恩述記為準一名一句務得其詮一義一量務盡其旨習規矩於步趨衡是非於智解乃知佛法文字不同世籍得魚固要忘筌廢筌亦不能得魚也然如世籍無義無利不外綺語戲論則非吾人所當習矣吾國佛法號稱十宗入主出奴各執己是究其實際隨時隨地各有變遷而吾國人之所信受者終不越乎吾國固有儒道沿襲之見縱或援引佛典名字不無非義為義標榜附會之嫌縱或傳譯佛教經論不無非法為法矜奇好異之弊求如俱舍唯識文顯義圓明了易解者渺不可得矣然俱舍教義不通大乘唯識精旨遮無外境猶不足以窺大乘全體大用民國十三年淨因離家居避靜平西房山雲居寺與芾煌居士同時發願研究瑜伽師地論欲以弘揚真實佛教精義而苦不得要領古疏中略纂倫記等皆不足以為研究之資匪唯義不能詳甚且文莫能解門猶不入室何能窺乃知此論傳譯雖久研討無人間或涉獵烏能有得科判不分則統系不明解釋無據則義理無當遂乃致力精研發願以三萬小時為期文義務求潤洽前後務求貫通不惑虛言但徵實際稔知平昔所聞於各宗者因多以訛傳訛而有扞格不通之弊即成唯識論十大論師所引大論亦自各引異文附成己意詎免顧此失彼之嫌自非熟讀大論者蓋難詳知其故矣何暇與人諍論得失耶嗣因時局戰亂突起兵匪擾害地方芾煌居士強余回平辟地造屋以居之繼乃創建三時學會以為學子研講之所約集同侶朝夕相從佛法真義得以日昌不幸國都日遷倭氛告警同侶日以星散矣乃與芾煌居士整理大論釐句讀立科判以為讀本三易其稿綱領次第始得井然釋文義以為披尋記前後披閲始得貫通自二十六年九月始迄三十二年一月終五年之間寒暑無輟幸得竣事大論端倪略具梗概乃復發見文句舛誤者固多章節錯簡者亦有非唯傳寫之訛亦乃原譯之失推厥所由其源遠矣茲略擇舉一二以明其失如抉擇分中思所成慧地所舉差別各法內有所知所識法應置所緣法前而竟漏略不及內無三苦性而反增入無因至所漏略所知所緣諸法發見妄列抉擇分聲聞地中此則章節錯簡毫無疑義者也披文勘校盡人能知初則以為傳刻之訛繼乃知為梵文之誤大論卷一百二十頁云復有十智能覺一切所知境界謂法智類智世俗智他心智苦等智盡無生智此廣分別如聲聞地然此十智分別應屬抉擇分思所成慧地皆是所知法差別不應列入聲聞地中當知譯本錯簡根據梵文不然何故前後同一訛誤古昔諸德皆未校正翻譯諸師亦未深察可知從事研究大論而能披文尋義者古今中外不易多覯矣又大論本地分菩薩地中分列初持瑜伽處第二持隨法瑜伽處第三持究竟瑜伽處第四持次第瑜伽處諸品不知何所依據菩薩地初嗢托南曰初持次相分增上意樂住生攝受地行建立最為後長行釋云持有三種一為堪任性持次為行加行持後為圓滿大菩提持皆為初持所攝次後皆不名持何可分為第二第三第四諸所持相譯本當亦根據梵文定非彌勒菩薩所說此則論文中間義不容有者也翻譯諸師沿襲增入豈非隨自意解與論相矛盾耶淨自揣愚陋不敢謂為無失然依論文前後互相印證披尋有據不託空言猶如老馬識途豈竟茫無覺爰即發願擬設清淨瑜伽館並成立董事會籌集資金培植學子以副造百論師弘揚瑜伽之旨而芾煌居士先已物故能無慨然乃事變告終瞬將三載而人心日非生計日迫雖欲聞法誰復有暇雖識奧旨誰肯精研前所發願造百論師弘揚瑜伽誠恐將成泡影矣然以弘法之願不在一時佛亦說法真理常住今日世界潮流推崇主義非唯厭故喜新實欲興利除弊然其終也適得其反強不同以為同挾非是以為是有乖事理之真不順自然之則人心演變各自為利馴至武力相抗釀為戰爭揆厥初因能無矛盾可慨也夫益信佛法真理不重言說縱有言說唯在解義平等自由之旨會之於心當無是非得失之辨未見其利先蒙其害苟有智者幸深察焉録文完
